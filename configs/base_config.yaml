# configs/base_config.yaml
audio:
  sample_rate: 16000
  n_fft: 2048
  hop_length: 512
  n_mels: 80
  duration: 3.0  # seconds

video:
  fps: 25
  duration: 3.0  # seconds
  frame_size: [224, 224]
  optical_flow_method: "raft"

model:
  embed_dim: 256
  num_heads: 8
  dropout: 0.1

training:
  batch_size: 16
  num_epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  lambda_align: 0.1
  lambda_recon: 0.05

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
